name: Frontend CI/CD + Docker & Vercel

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-deploy:
    name: Lint, Test, Build, Docker & Vercel
    runs-on: ubuntu-latest
    steps:
      # ------------------------------
      # Checkout
      # ------------------------------
      - uses: actions/checkout@v4

      # ------------------------------
      # Node.js Setup
      # ------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ------------------------------
      # Install dependencies
      # ------------------------------
      - name: Install Dependencies
        run: npm ci

      # ------------------------------
      # Lint & Security Audit
      # ------------------------------
      - name: Lint
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=high

      # ------------------------------
      # Run unit tests
      # ------------------------------
      - name: Run Vitest
        run: npx vitest run

      # ------------------------------
      # Build project
      # ------------------------------
      - name: Build Project
        run: npm run build

      # ------------------------------
      # Upload build artifact (optional)
      # ------------------------------
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: dist

      # ------------------------------
      # Docker Build & Push
      # ------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/innovet-frontend:latest ./frontend

      - name: Trivy Security Scan (Frontend)
        uses: aquasecurity/trivy-action@v0.11.0
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/innovet-frontend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend Docker Image
        if: success()
        run: docker push ${{ secrets.DOCKER_USERNAME }}/innovet-frontend:latest

      # ------------------------------
      # Vercel Deployment
      # ------------------------------
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v23
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          prod-branch: main